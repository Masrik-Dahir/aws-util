name: Upload Python Package to PyPI when a Release is Created

on:
  release:
    types: [published] # 'published' is usually safer than 'created' to ensure the release is final

jobs:
  pypi-publish:
    name: Publish release to PyPI
    runs-on: ubuntu-latest

    # This block creates the link in the GitHub UI
    environment:
      name: pypi
      url: https://pypi.org/project/aws-util/

    permissions:
      contents: read
      id-token: write # Required for Trusted Publishing (OIDC)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token needed here if OIDC is configured on PyPI
